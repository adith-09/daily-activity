name: Daily Activity

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "$(date)" > activity.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add activity.txt
          git commit -m "daily update" || exit 0
          git push
